<div class="dashboard">

    <div class="welcome-card">

        <div>

            <h1>Dashboard</h1>

            <p>
                Welcome back. Here's an overview of your project management activities.
            </p>

        </div>

        <div class="today">

            {{ today | date:'dd MMM yyyy' }}

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">

            <div class="title">

                Total Users

            </div>

            <div class="value">

                {{ totalUsers }}

            </div>

        </div>

        <div class="stat-card">

            <div class="title">

                Total Projects

            </div>

            <div class="value">

                {{ totalProjects }}

            </div>

        </div>

        <div class="stat-card">

            <div class="title">

                Total Tasks

            </div>

            <div class="value">

                {{ totalTasks }}

            </div>

        </div>

        <div class="stat-card">

            <div class="title">

                Completed Tasks

            </div>

            <div class="value">

                {{ completedTasks }}

            </div>

        </div>

    </div>

    <div class="action-card">

        <div class="action-header">

            <h2>Quick Actions</h2>

            <p>Create records quickly.</p>

        </div>

        <div class="action-buttons">

            <button
                class="primary"
                routerLink="/projects/add">

                Add Project

            </button>

            <button
                class="primary"
                routerLink="/tasks/add">

                Add Task

            </button>

            <button
                class="primary"
                routerLink="/users/add">

                Add User

            </button>

        </div>

    </div>

</div>
